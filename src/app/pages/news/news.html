<h1>Latest News</h1>

@if (!gNews.loading()) {
    <div class="news">
        @for (article of articles(); track $index) {
            <merck-article [article]="article"></merck-article>
        }
    </div>
} @else {
    <div class="loading-container">
        <p-progress-spinner ariaLabel="loading" style="width: 100px; height: 100px" />
        <p class="loading-text">Loading news articles...</p>
    </div>
}
